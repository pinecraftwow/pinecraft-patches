name: Build manifest

on:
  release:
    types: [published]

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone launcher (for sign-manifest tool)
        run: git clone --depth 1 https://github.com/pinecraftwow/wow-launcher.git launcher

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir ./assets

      - name: Write private key
        run: echo "${{ secrets.MANIFEST_PRIV_KEY }}" > priv.hex

      - name: Build + sign manifest
        run: |
          cd launcher
          go run ./tools/sign-manifest build \
            --patches-toml ../patches.toml \
            --assets-dir ../assets \
            --release-tag "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --key ../priv.hex \
            --out ../manifest.json

      - name: Upload manifest to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" manifest.json \
            --repo "${{ github.repository }}" \
            --clobber
